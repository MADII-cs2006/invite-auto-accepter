name: Auto Accept Repo Invitations

on:
  schedule:
    # - cron: "0 3 * * *"   # once daily (3 AM UTC)
    # - cron: "0 15 * * *"  # second run (3 PM UTC)
    - cron: "0 */8 * * *"  
  workflow_dispatch:      # allows manual trigger with button

jobs:
  accept-invites:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run invite acceptor
        env:
          MADI_PAT: ${{ secrets.MADI_PAT }}
        run: python accept_invites.py
      - name: Commit logs
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add accepted_log.txt
          git commit -m "Update invite logs" || echo "No changes"
          git push
